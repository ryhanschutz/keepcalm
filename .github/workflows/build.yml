name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # Roda quando você cria uma tag (ex: git tag v1.0.0 e git push --tags)
  workflow_dispatch: # Permite rodar manualmente no painel do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-in para Node 24 conforme instrução do GitHub

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build/release Electron app
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
