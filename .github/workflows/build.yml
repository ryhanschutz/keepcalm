name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # Roda quando você cria uma tag (ex: git tag v1.2.0 && git push --tags)
  workflow_dispatch: # Permite rodar manualmente no painel do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    environment: Production - keepcalm-yole

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Inject production credentials into config.js
        run: |
          node -e "const fs = require('fs'); let c = fs.readFileSync('config.js', 'utf8'); c = c.replace('__MQTT_HOST__', process.env.MQTT_HOST).replace('__MQTT_PORT__', process.env.MQTT_PORT).replace('__MQTT_USERNAME__', process.env.MQTT_USERNAME).replace('__MQTT_PASSWORD__', process.env.MQTT_PASSWORD); fs.writeFileSync('config.js', c);"
        env:
          MQTT_HOST: ${{ secrets.MQTT_HOST }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}

      - name: Build/release Electron app
        run: npx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
