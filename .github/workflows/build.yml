name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # Roda quando você cria uma tag (ex: git tag v1.2.0 && git push --tags)
  workflow_dispatch: # Permite rodar manualmente no painel do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    environment: Production - keepcalm-yole

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Inject production credentials into config.js
        shell: pwsh
        run: |
          $content = Get-Content -Path config.js -Raw
          $content = $content -replace '__MQTT_HOST__', '${{ secrets.MQTT_HOST }}'
          $content = $content -replace '''__MQTT_PORT__''', '${{ secrets.MQTT_PORT }}'
          $content = $content -replace '__MQTT_USERNAME__', '${{ secrets.MQTT_USERNAME }}'
          $content = $content -replace '__MQTT_PASSWORD__', '${{ secrets.MQTT_PASSWORD }}'
          Set-Content -Path config.js -Value $content -Encoding UTF8

      - name: Build/release Electron app
        run: npx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
